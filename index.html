<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Finanças Mobile v1.7.8</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; touch-action: manipulation; }
    body { 
      margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; 
      background: #121212; color: #e0e0e0; overflow-x: hidden; /* Evita rolagem lateral no corpo */
    }
    .container { max-width: 100vw; margin: 0 auto; padding: 10px; background: #1e1e1e; min-height: 100vh; overflow-x: hidden; }
    
    header { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 1.1rem; margin: 0; color: #3b82f6; }

    #btn-instalar-pwa {
      display: none; background: #10b981; color: white; border: none; padding: 12px;
      border-radius: 10px; font-weight: bold; width: 100%; margin-bottom: 10px;
    }

    .header-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button, input, select { min-height: 44px; padding: 8px; border-radius: 10px; border: 1px solid #444; background: #333; color: #fff; font-size: 0.85rem; }
    button { background: #3b82f6; font-weight: 600; border: none; cursor: pointer; }

    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .card { padding: 12px; border-radius: 12px; background: #2a2a2a; border-left: 4px solid #3b82f6; }
    .card h2 { margin: 0 0 4px; font-size: 0.6rem; color: #9ca3af; text-transform: uppercase; }
    .card p { margin: 0; font-size: 0.95rem; font-weight: 800; }

    .secao { background: #242424; padding: 12px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; width: 100%; }
    .secao h3 { margin: 0 0 15px 0; font-size: 0.95rem; color: #3b82f6; }

    /* AJUSTE DE TABELA PARA NÃO VAZAR */
    .table-container { width: 100%; overflow: hidden; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; /* Força o respeito às larguras */ }
    th { background: #1a1a1a; color: #9ca3af; font-size: 0.55rem; text-transform: uppercase; padding: 8px 4px; text-align: left; }
    td { padding: 10px 4px; border-bottom: 1px solid #333; font-size: 0.8rem; overflow-wrap: break-word; word-wrap: break-word; }
    
    /* LARGURAS FIXAS PARA AS COLUNAS */
    .col-data { width: 45px; }
    .col-valor { width: 90px; text-align: right; }
    .col-acao { width: 35px; text-align: center; }
    .col-desc { width: auto; } /* A descrição ocupa o que sobrar */

    .btn-remover { background: #ef4444; width: 28px; height: 28px; border-radius: 6px; color: white; border:none; }
    
    #modal-pagamento { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #2a2a2a; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #444; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top"><h1>💰 Finanças Mobile</h1><select id="mes_select" onchange="renderizar();"></select></div>
      <button id="btn-instalar-pwa" onclick="instalarApp()">📲 INSTALAR APLICATIVO</button>
      <div class="header-actions">
        <button onclick="exportarJSON()" style="background: #4b5563;">📤 EXPORTAR</button>
        <button onclick="document.getElementById('input-import').click()" style="background: #4b5563;">📥 IMPORTAR</button>
        <input type="file" id="input-import" style="display: none;" onchange="importarJSON(event)">
      </div>
    </header>

    <section class="cards">
      <div class="card" style="border-left-color: #facc15;"><h2>Bruta</h2><p id="res-bruta">R$ 0</p></div>
      <div class="card" style="border-left-color: #3b82f6;"><h2>Adiant.</h2><p id="res-adiant">R$ 0</p></div>
      <div class="card" style="border-left-color: #10b981;"><h2>Salário</h2><p id="res-salario">R$ 0</p></div>
      <div class="card" style="border-left-color: #f59e0b;"><h2>Cartão</h2><p id="res-fatura">R$ 0</p></div>
    </section>

    <div class="secao">
      <h3>🛒 Gastos Variáveis</h3>
      <div style="background: #1a1a1a; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px;">
          <input type="date" id="var-data">
          <input type="number" id="var-valor" placeholder="Valor" inputmode="decimal">
        </div>
        <input type="text" id="var-desc" placeholder="Descrição" style="width: 100%; margin-bottom: 5px;">
        <div style="display: flex; gap: 5px;">
          <select id="var-meio" style="flex: 1;"><option value="debito">💰 Débito</option><option value="credito">💳 Crédito</option></select>
          <button onclick="addVariavel()" style="flex: 1; background: #10b981;">Salvar</button>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="col-data">Data</th>
              <th class="col-desc">Desc.</th>
              <th class="col-valor">Valor</th>
              <th class="col-acao"></th>
            </tr>
          </thead>
          <tbody id="tabela-variaveis-body"></tbody>
        </table>
      </div>
    </div>

    <div class="secao">
      <h3>📋 Contas Fixas</h3>
      <button style="width:100%; margin-bottom:10px; background: #8b5cf6;" onclick="addDespesaFixa()">+ Nova Fixa</button>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:30px;">OK</th>
              <th class="col-desc">Desc.</th>
              <th class="col-valor">Valor</th>
              <th class="col-acao"></th>
            </tr>
          </thead>
          <tbody id="tabela-fixas"></tbody>
        </table>
      </div>
    </div>

    <div class="secao">
      <h3>💵 Receitas</h3>
      <button style="width:100%; margin-bottom:10px;" onclick="addReceita()">+ Nova Receita</button>
      <div class="table-container">
        <table>
          <thead><tr><th class="col-desc">Desc.</th><th class="col-valor">Valor</th><th class="col-acao"></th></tr></thead>
          <tbody id="tabela-receitas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modal-pagamento"><div class="modal-content"><h3>Pagamento</h3><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><button onclick="processarEscolha('credito')" style="background: #f59e0b;">💳 CRÉDITO</button><button onclick="processarEscolha('debito')" style="background: #10b981;">💰 DÉBITO</button></div></div></div>

  <script>
    // LÓGICA PWA E INSTALAÇÃO
    let servicoInstalacao;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); servicoInstalacao = e;
      document.getElementById('btn-instalar-pwa').style.display = 'block';
    });
    async function instalarApp() {
      if (!servicoInstalacao) return;
      servicoInstalacao.prompt();
      const { outcome } = await servicoInstalacao.userChoice;
      if (outcome === 'accepted') document.getElementById('btn-instalar-pwa').style.display = 'none';
      servicoInstalacao = null;
    }

    const STORAGE_KEY = "App_Financeiro_Mobile_Data";
    let dados = JSON.parse(localStorage.getItem(STORAGE_KEY)) || inicializar();
    let itemSelecionadoIdx = null;

    function inicializar() {
      const base = { config: { limiteCartao: 0 } };
      for (let m = 3; m <= 12; m++) {
        const id = `2026-${String(m).padStart(2, '0')}`;
        base[id] = { receitas: [{desc: "Adiantamento", valor: 0}, {desc: "Salário", valor: 0}], fixas: [], variaveis: [] };
      }
      return base;
    }

    function salvar() { localStorage.setItem(STORAGE_KEY, JSON.stringify(dados)); atualizarResumo(); }
    function formatarMoeda(v) { return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function renderizar() {
      const mes = document.getElementById("mes_select").value;
      const info = dados[mes] || { receitas: [], fixas: [], variaveis: [] };
      
      document.getElementById("tabela-receitas").innerHTML = info.receitas.map((r, i) => `
        <tr><td class="col-desc">${r.desc}</td><td class="col-valor"><input type="number" step="0.01" style="width:75px; background:transparent; border:1px solid #444; color:white; text-align:right;" value="${r.valor.toFixed(2)}" onchange="dados['${mes}'].receitas[${i}].valor=parseFloat(this.value)||0;salvar()"></td>
        <td class="col-acao"><button onclick="removerItem('receitas', ${i})" class="btn-remover">×</button></td></tr>`).join('');

      document.getElementById("tabela-fixas").innerHTML = info.fixas.map((f, i) => `
        <tr style="${f.paga ? 'opacity: 0.5' : ''}">
          <td><input type="checkbox" ${f.paga ? 'checked' : ''} onchange="abrirModalPagamento(${i}, this.checked)"></td>
          <td class="col-desc">${f.categoria} ${f.paga ? (f.meio==='credito'?'💳':'💰') : ''}</td>
          <td class="col-valor">${formatarMoeda(f.valor)}</td>
          <td class="col-acao"><button onclick="removerItem('fixas', ${i})" class="btn-remover">×</button></td>
        </tr>`).join('');

      document.getElementById("tabela-variaveis-body").innerHTML = (info.variaveis || []).map((v, i) => `
        <tr>
          <td class="col-data" style="color:#9ca3af; font-size:0.65rem;">${v.data.split('-')[2]}/${v.data.split('-')[1]}</td>
          <td class="col-desc">${v.meio==='credito'?'💳':'💰'} ${v.descricao}</td>
          <td class="col-valor" style="font-weight:bold; color:${v.meio==='credito'?'#f59e0b':'#10b981'};">${formatarMoeda(v.valor)}</td>
          <td class="col-acao"><button onclick="removerItem('variaveis', ${i})" class="btn-remover">×</button></td>
        </tr>`).join('');
      
      atualizarResumo();
    }

    function atualizarResumo() {
      const mes = document.getElementById("mes_select").value;
      const info = dados[mes];
      let bruta = 0, vAdiant = 0, vSal = 0, fatura = 0, pAdiant = 0, pSal = 0;
      info.receitas.forEach(r => { 
        bruta += r.valor; 
        if (r.desc.toLowerCase().includes("adiant")) vAdiant += r.valor; 
        else if (r.desc.toLowerCase().includes("salari")) vSal += r.valor;
      });
      [...info.fixas, ...info.variaveis].forEach(item => {
        if (item.meio === 'credito') fatura += item.valor;
        else if (item.paga || item.meio === 'debito') {
          const dia = parseInt(item.data?.split('-')[2] || 10);
          if (dia <= 15) pAdiant += item.valor; else pSal += item.valor;
        }
      });
      document.getElementById("res-bruta").textContent = formatarMoeda(bruta);
      document.getElementById("res-adiant").textContent = formatarMoeda(vAdiant - pAdiant);
      document.getElementById("res-salario").textContent = formatarMoeda(vSal - pSal);
      document.getElementById("res-fatura").textContent = formatarMoeda(fatura);
    }

    function abrirModalPagamento(idx, isChecked) {
      if (!isChecked) {
        dados[document.getElementById("mes_select").value].fixas[idx].paga = false;
        dados[document.getElementById("mes_select").value].fixas[idx].meio = "";
        salvar(); renderizar(); return;
      }
      itemSelecionadoIdx = idx;
      document.getElementById("modal-pagamento").style.display = "flex";
    }

    function processarEscolha(meio) {
      const mes = document.getElementById("mes_select").value;
      const item = dados[mes].fixas[itemSelecionadoIdx];
      item.meio = meio; item.paga = true;
      if(meio === 'debito') item.data = `${mes}-${prompt("Dia:", new Date().getDate())}`;
      else item.data = `${mes}-01`;
      document.getElementById("modal-pagamento").style.display = "none";
      salvar(); renderizar();
    }

    function addVariavel() {
      const mes = document.getElementById("mes_select").value, data = document.getElementById("var-data").value, desc = document.getElementById("var-desc").value, valor = parseFloat(document.getElementById("var-valor").value), meio = document.getElementById("var-meio").value;
      if (!data || isNaN(valor) || !desc) return alert("Preencha tudo!");
      dados[mes].variaveis.push({ data, descricao: desc, valor, meio });
      document.getElementById("var-desc").value = ""; document.getElementById("var-valor").value = "";
      salvar(); renderizar();
    }

    function addReceita() { 
      const n = prompt("Descrição:"); const v = parseFloat(prompt("Valor:"));
      if(n) { dados[document.getElementById("mes_select").value].receitas.push({desc: n, valor: v||0}); salvar(); renderizar(); }
    }

    function addDespesaFixa() {
      const n = prompt("Nome:"); const v = parseFloat(prompt("Valor:"));
      if(n) { dados[document.getElementById("mes_select").value].fixas.push({categoria: n, valor: v||0, paga: false, meio: ""}); salvar(); renderizar(); }
    }

    function popularMeses() {
      const sel = document.getElementById("mes_select"), ms = ["Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
      ms.forEach((m, i) => { 
        let o = document.createElement("option"); o.value = `2026-${String(i+3).padStart(2,'0')}`; o.textContent = m; 
        if(o.value === "2026-03") o.selected = true; sel.appendChild(o); 
      });
    }

    function removerItem(tipo, i) { if(confirm("Excluir?")) { dados[document.getElementById("mes_select").value][tipo].splice(i,1); salvar(); renderizar(); } }
    function exportarJSON() { const b = new Blob([JSON.stringify(dados)], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download=`backup.json`; a.click(); }
    function importarJSON(e) { const r = new FileReader(); r.onload = (v) => { try { dados = JSON.parse(v.target.result); salvar(); renderizar(); } catch(err) { alert("Erro!"); } }; r.readAsText(e.target.files[0]); }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
    popularMeses(); renderizar();
  </script>
</body>
</html>
