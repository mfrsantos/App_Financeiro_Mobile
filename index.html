<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>App Financeiro Mobile</title>
  
  <link rel="manifest" href="/App_Financeiro_Mobile/manifest.json">
  <meta name="theme-color" content="#121212">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/App_Financeiro_Mobile/sw.js', { scope: '/App_Financeiro_Mobile/' })
        .then(() => console.log("App Financeiro Mobile: PWA Ativo"))
        .catch((err) => console.log("Erro PWA:", err));
    }
  </script>

  <style>
    /* Estilos Otimizados para Mobile (Realme C75) e Tablet */
    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; touch-action: manipulation; }
    
    body { 
      margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; 
      background: #121212; color: #e0e0e0; -webkit-tap-highlight-color: transparent; 
    }
    
    .container { max-width: 1300px; margin: 0 auto; padding: 15px; background: #1e1e1e; min-height: 100vh; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
    h1 { font-size: 1.2rem; margin: 0; color: #3b82f6; }

    /* Botões e Inputs amigáveis ao toque (48px) */
    button, input, select { 
      min-height: 48px; 
      padding: 10px; 
      border-radius: 10px; 
      border: 1px solid #444; 
      background: #333; 
      color: #fff; 
      font-size: 1rem; 
    }
    
    button { background: #3b82f6; font-weight: 600; border: none; cursor: pointer; }
    button:active { transform: scale(0.98); opacity: 0.9; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .card { padding: 15px; border-radius: 12px; background: #2a2a2a; border-left: 5px solid #3b82f6; }
    .card h2 { margin: 0 0 5px; font-size: 0.7rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
    .card p { margin: 0; font-size: 1.2rem; font-weight: 800; }

    .card-receita-total { border-left-color: #facc15; } .card-receita-total p { color: #facc15; }
    .card-adiantamento { border-left-color: #3b82f6; } .card-adiantamento p { color: #60a5fa; }
    .card-salario { border-left-color: #10b981; } .card-salario p { color: #34d399; }
    .card-fatura { border-left-color: #f59e0b; } .card-fatura p { color: #fbbf24; }
    .card-limite { border-left-color: #ec4899; } .card-limite p { color: #f472b6; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }
    
    .table-container { width: 100%; overflow-x: auto; border-radius: 10px; background: #242424; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; font-size: 0.9rem; }
    
    .btn-remover { background: #ef4444; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    
    .area-antecipacao { background: #2a2a2a; padding: 15px; border-radius: 12px; border: 1px solid #f59e0b; margin-top: 20px; }
    .input-tabela { width: 90px; background: transparent; border: 1px solid #444; text-align: right; }

    input[type="date"] { color-scheme: dark; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💰 App Financeiro Mobile</h1>
      <div style="display: flex; gap: 8px;">
        <button onclick="exportarJSON()">📤</button>
        <button onclick="document.getElementById('input-import').click()">📥</button>
        <input type="file" id="input-import" style="display: none;" onchange="importarJSON(event)">
        <select id="mes_select" onchange="renderizar();"></select>
      </div>
    </header>

    <section style="margin-bottom: 15px; background: #2a2a2a; padding: 15px; border-radius: 12px; border: 1px solid #444;">
      <label style="font-size: 0.8rem; color: #f472b6; font-weight: bold;">💳 Limite Total do Cartão:</label>
      <input type="number" id="cfg-limite" inputmode="decimal" step="0.01" onchange="atualizarLimiteBase(this.value)" style="width: 100%; margin-top: 5px; border-color: #ec4899;">
    </section>

    <section class="cards">
      <div class="card card-receita-total"><h2>Receita Bruta</h2><p id="receita-total-mes">R$ 0,00</p></div>
      <div class="card card-adiantamento"><h2>Saldo Adiant.</h2><p id="saldo-adiantamento">R$ 0,00</p></div>
      <div class="card card-salario"><h2>Saldo Salário</h2><p id="saldo-salario">R$ 0,00</p></div>
      <div class="card card-fatura"><h2>Fatura Aberta</h2><p id="fatura-restante">R$ 0,00</p></div>
      <div class="card card-limite"><h2>Limite Disponível</h2><p id="limite-disponivel">R$ 0,00</p></div>
    </section>

    <div class="grid">
      <div class="secao">
        <h3>💵 Receitas</h3>
        <button onclick="addReceita()" style="width: 100%; margin-bottom: 10px;">+ Adicionar Receita</button>
        <div class="table-container">
            <table><tbody id="tabela-receitas"></tbody></table>
        </div>
      </div>

      <div class="secao">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
          <h3>📋 Fixas</h3>
          <button onclick="replicarFixas()" style="background: #8b5cf6; font-size: 0.8rem; min-height: 40px;">🔄 Replicar Meses</button>
        </div>
        <button onclick="addDespesaFixa()" style="width: 100%; margin: 10px 0;">+ Adicionar Fixa</button>
        <div class="table-container">
            <table><tbody id="tabela-fixas"></tbody></table>
        </div>
      </div>
    </div>

    <section class="area-antecipacao">
      <h3>💳 Pagamento de Fatura</h3>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <input type="date" id="ant-data">
        <input type="number" id="ant-valor" inputmode="decimal" step="0.01" placeholder="Valor R$">
        <button onclick="registrarPagamentoFatura()" style="background: #10b981;">Confirmar Pagamento</button>
      </div>
      <p id="total-antecipado-exibicao" style="text-align: right; color: #10b981; font-weight: bold; margin-top: 10px;"></p>
    </section>

    <section style="margin-top: 25px; padding-bottom: 50px;">
      <h3>🛒 Despesas Variáveis</h3>
      <div style="background: #2a2a2a; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #444;">
        <input type="date" id="var-data">
        <input type="text" id="var-desc" placeholder="Descrição da compra">
        <input type="number" id="var-valor" inputmode="decimal" step="0.01" placeholder="R$ 0,00">
        <div style="display: flex; gap: 10px;">
            <select id="var-meio" style="flex: 1;">
                <option value="debito">💰 Débito</option>
                <option value="credito">💳 Crédito</option>
            </select>
            <button onclick="addVariavel()" style="flex: 1;">Registrar</button>
        </div>
      </div>
      <div class="table-container" style="margin-top: 15px;">
        <table id="tabela-variaveis">
            <thead><tr><th>Data</th><th>Desc.</th><th>Valor</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "App_Financeiro_Mobile_Data";
